name: Deploy with iMessage Gate

on:
  push:
    branches: [main]

env:
  GATE_SERVER: ${{ secrets.GATE_SERVER_URL }}
  NOTIFY_NUMBER: ${{ secrets.NOTIFY_NUMBER }}
  TIMEOUT_MINUTES: 10

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  deploy-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.poll.outputs.decision }}
      canary_percent: ${{ steps.poll.outputs.canary_percent }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate deploy ID
        id: deploy-id
        run: echo "id=deploy-$(date +%s)-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Collect commit metadata
        id: meta
        run: |
          {
            echo "sha=${{ github.sha }}"
            echo "msg<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
            echo "files<<EOF"
            git diff --name-only HEAD~1 HEAD || true
            echo "EOF"
            echo "stat<<EOF"
            git diff --stat HEAD~1 HEAD || true
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Register deploy + send iMessage
        run: |
          python3 <<'PY'
          import json, os, urllib.request
          files = [l for l in os.environ.get("FILES","").splitlines() if l]
          payload = {
              "deploy_id": os.environ["DEPLOY_ID"],
              "repo": os.environ["REPO"],
              "branch": os.environ["BRANCH"],
              "actor": os.environ["ACTOR"],
              "notify_number": os.environ["NOTIFY_NUMBER"],
              "commit_sha": os.environ["SHA"],
              "commit_message": os.environ.get("MSG",""),
              "files_changed": files,
              "diff_stat": os.environ.get("STAT",""),
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['REPO']}/actions/runs/{os.environ['RUN_ID']}",
          }
          req = urllib.request.Request(
              f"{os.environ['GATE_SERVER']}/deploy/register",
              data=json.dumps(payload).encode(),
              headers={"Content-Type":"application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          PY
        env:
          DEPLOY_ID: ${{ steps.deploy-id.outputs.id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ steps.meta.outputs.sha }}
          MSG: ${{ steps.meta.outputs.msg }}
          FILES: ${{ steps.meta.outputs.files }}
          STAT: ${{ steps.meta.outputs.stat }}
          RUN_ID: ${{ github.run_id }}

      - name: Poll for decision
        id: poll
        run: |
          DEPLOY_ID="${{ steps.deploy-id.outputs.id }}"
          DEADLINE=$(( $(date +%s) + ${{ env.TIMEOUT_MINUTES }} * 60 ))
          while true; do
            if [ $(date +%s) -ge $DEADLINE ]; then
              echo "decision=timeout" >> $GITHUB_OUTPUT
              exit 1
            fi
            RESP=$(curl -s "$GATE_SERVER/deploy/status/$DEPLOY_ID")
            STATE=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin)['state'])")
            PERCENT=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('canary_percent',100))")
            echo "State: $STATE ($PERCENT%)"
            if [ "$STATE" = "approved" ]; then
              echo "decision=approved" >> $GITHUB_OUTPUT
              echo "canary_percent=$PERCENT" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATE" = "rolled_back" ]; then
              echo "decision=rolled_back" >> $GITHUB_OUTPUT
              exit 1
            fi
            sleep 10
          done

  deploy:
    needs: deploy-gate
    if: needs.deploy-gate.outputs.decision == 'approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          PERCENT="${{ needs.deploy-gate.outputs.canary_percent }}"
          echo "Deploying ${{ github.sha }} at ${PERCENT}% traffic..."
          # Replace with real deploy; use $PERCENT to drive canary/full rollout.

      - name: Notify success
        run: |
          curl -s -X POST "https://api.linqapp.com/api/partner/v3/chats" \
            -H "Authorization: Bearer ${{ secrets.LINQ_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{
              "from": "${{ secrets.LINQ_PHONE_NUMBER }}",
              "to": ["${{ env.NOTIFY_NUMBER }}"],
              "message": {
                "parts": [{"type":"text","value":"Deployed ${{ github.repository }} @ ${{ github.sha }} (${{ needs.deploy-gate.outputs.canary_percent }}%)"}]
              }
            }'
